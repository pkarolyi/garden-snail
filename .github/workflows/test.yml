name: Test

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.15.1"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm lint
  test:
    name: Test (unit)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.15.1"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Test
        run: pnpm test:cov
  test-e2e:
    name: Test (e2e)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20.15.1"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Test e2e
        run: pnpm test:e2e
  test-integration-v1:
    name: Test (integration, turbo@1.13.4)
    runs-on: ubuntu-22.04
    needs: [lint, test, test-e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Expose GitHub Runtime for caching
        uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3.1.0
      - name: Build docker images
        run: docker compose -f integration/compose-v1.yml build
      - name: Test API with turborepo
        run: docker compose -f integration/compose-v1.yml run test-v1 1.13.4
  test-integration-v2:
    name: Test (integration, turbo@^2)
    runs-on: ubuntu-22.04
    needs: [lint, test, test-e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Expose GitHub Runtime for caching
        uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3.1.0
      - name: Build docker images
        run: docker compose -f integration/compose-v2.yml build
      - name: Test API with turborepo
        run: docker compose -f integration/compose-v2.yml run test-v2 ^2
  test-integration-v1-s3:
    name: Test (integration, turbo@1.13.4, S3)
    runs-on: ubuntu-22.04
    needs: [lint, test, test-e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Expose GitHub Runtime for caching
        uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3.1.0
      - name: Build docker images
        run: docker compose -f integration/compose-v1-s3.yml build
      - name: Test API with turborepo (S3 storage)
        run: docker compose -f integration/compose-v1-s3.yml run test-v1 1.13.4
  test-integration-v2-s3:
    name: Test (integration, turbo@^2, S3)
    runs-on: ubuntu-22.04
    needs: [lint, test, test-e2e]
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Expose GitHub Runtime for caching
        uses: crazy-max/ghaction-github-runtime@3cb05d89e1f492524af3d41a1c98c83bc3025124 # v3.1.0
      - name: Build docker images
        run: docker compose -f integration/compose-v2-s3.yml build
      - name: Test API with turborepo (S3 storage)
        run: docker compose -f integration/compose-v2-s3.yml run test-v2 ^2
